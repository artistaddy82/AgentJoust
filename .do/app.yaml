name: agentjoust
static_sites:
  - name: agentjoust-web
    github:
      repo: artistaddy82/AgentJoust
      branch: main
      deploy_on_push: true
    build_command: node build.js
    output_dir: dist
    envs:
      - key: SITE_URL
        value: https://agentjoust.com
      - key: API_URL
        value: https://sidecarleads.com
    routes:
      - path: /
    error_document: 404.html
