name: agentjoust
services:
  - name: agentjoust-web
    github:
      repo: artistaddy82/AgentJoust
      branch: main
      deploy_on_push: true
    build_command: npm install && npm run build
    run_command: npm start
    http_port: 3000
    instance_size_slug: basic-xxs
    envs:
      - key: SITE_URL
        value: https://agentjoust.com
      - key: API_URL
        value: https://sidecarleads.com
      - key: NODE_ENV
        value: production
      - key: RESEND_API_KEY
        value: ""
        type: SECRET
      - key: RESEND_FROM
        value: AgentJoust <noreply@agentjoust.com>
